<!DOCTYPE html> 
<html lang="en"> 
<head> 
 <meta charset="UTF-8"> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
 <title>XIAO Telemetry</title> 
</head> 
<body> 
 <!-- Unified Status Bar Toggles --> 
 <div id="statusBar" class="status-bar"> 
 <span id="statusText" class="status-text"> 
 •• Disconnected
 </span>
 <button id="toggleBtn" class="hdr-btn ctl-btn" onclick="toggleConnection()">
 Connect
 </button>
 </div>

 <!-- Layout Container Grid Matrix -->
 <div class="dashboard">
 
 <!-- Left Data Metrics Display -->
 <div class="left-col">
 
 <!-- Temperature Output Tri-Row -->
 <div class="temp-row">
 <div class="card">
 <div class="label">Max Temp</div>
 <div class="val" id="max">--.- °C</div>
 </div>
 <div class="card">
 <div class="label">Current</div>
 <div class="val" id="cur">--.- °C</div>
 </div>
 <div class="card">
 <div class="label">Min Temp</div>
 <div class="val" id="min">--.- °C</div>
 </div> 
 </div> 

 <!-- Battery Level Indicator Card --> 
 <div class="card battery-card"> 
 <div class="label">Battery Voltage</div> 
 <div class="val bat-val" id="bat">--.- V</div> 
 <div class="battery-icon"> 
 <div id="batLevel" class="battery-level"></div> 
 </div> 
 </div> 

 <!-- Connection Elapsed Timer Display --> 
 <div class="card"> 
 <div class="label">Session Elapsed Time</div> 
 <div class="val" id="elapsedTime" style="color: #a855f7; font-size: 1.6rem;"> 
 00:00:00 
 </div> 
 </div> 
 </div> 

 <!-- Right Side Command Switches Panel --> 
 <div class="right-col"> 
 <button id="resetBtn" class="action-btn" onclick="triggerReset()" disabled> 
 Reset Metrics 
 </button> 
 
 <button id="extendBtn" class="action-btn" onclick="triggerExtend()" disabled>
 Extend Session (+2m)
 </button>

 <button id="pauseBtn" class="warn-btn" onclick="togglePauseState()" disabled>
 Pause Session
 </button>

 <button id="sleepBtn" class="danger-btn" onclick="triggerSleep()" disabled> 
 Deep Sleep 
 </button> 
 </div> 
 </div>
</body>
</html>
<style> 
 body { 
 font-family: system-ui, sans-serif; 
 background: #111827; 
 color: #f9fafb; 
 margin: 0; 
 padding: 0.75rem; 
 box-sizing: border-box; 
 } 
 .status-bar { 
 display: flex; 
 align-items: center; 
 justify-content: space-between; 
 background: #1f2937; 
 padding: 0.5rem 0.75rem; 
 border-radius: 8px; 
 margin-bottom: 0.75rem; 
 font-weight: bold; 
 border-left: 6px solid #ef4444; 
 transition: all 0.3s; 
 font-size: 0.9rem; 
 } 
 .status-bar.connected { 
 border-left-color: #10b981; 
 color: #10b981; 
 } 
 .status-bar.reconnecting { 
 border-left-color: #f59e0b; 
 color: #f59e0b; 
 } 
 .status-text { 
 display: flex; 
 align-items: center; 
 gap: 6px; 
 } 
 .dashboard { 
 display: grid; 
 grid-template-columns: 2fr 1fr; 
 gap: 1rem; 
 max-width: 800px; 
 margin: 0 auto; 
 } 
 .left-col { 
 display: flex; 
 flex-direction: column; 
 gap: 1rem; 
 } 
 .temp-row { 
 display: grid; 
 grid-template-columns: repeat(3, 1fr); 
 gap: 0.5rem; 
 } 
 .card { 
 background: #1f2937; 
 padding: 0.75rem 0.5rem; 
 border-radius: 12px; 
 box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
 text-align: center; 
 } 
 .label { 
 font-size: 0.75rem; 
 text-transform: uppercase; 
 color: #9ca3af; 
 font-weight: 600; 
 } 
 .val { 
 font-size: 1.25rem; 
 color: #38bdf8; 
 font-weight: bold; 
 margin-top: 0.25rem; 
 } 
 .battery-card { 
 padding: 1.25rem 0.5rem; 
 display: flex; 
 flex-direction: column; 
 align-items: center; 
 } 
 .bat-val { 
 font-size: 2.5rem; 
 color: #10b981; 
 margin-top: 0.25rem; 
 transition: color 0.3s; 
 } 
 .battery-icon { 
 width: 70px; 
 height: 35px; 
 border: 3px solid #9ca3af; 
 border-radius: 6px; 
 position: relative; 
 padding: 2px; 
 box-sizing: border-box; 
 margin-top: 0.5rem; 
 } 
 .battery-icon::after { 
 content: ''; 
 position: absolute; 
 right: -8px; 
 top: 8px; 
 width: 5px; 
 height: 12px; 
 background: #9ca3af; 
 border-radius: 0 3px 3px 0; 
 } 
 .battery-level { 
 height: 100%; 
 width: 0%; 
 background: #10b981; 
 border-radius: 2px; 
 transition: width 0.5s; 
 } 
 .right-col { 
 display: flex; 
 flex-direction: column; 
 gap: 0.5rem; 
 } 
 button { 
 padding: 10px; 
 font-size: 0.95rem; 
 border-radius: 8px; 
 cursor: pointer; 
 border: none; 
 font-weight: 600; 
 } 
 button:disabled { 
 background: #374151 !important; 
 color: #9ca3af; 
 cursor: not-allowed; 
 } 
 .hdr-btn { 
 width: auto; 
 padding: 6px 14px; 
 font-size: 0.85rem; 
 border-radius: 6px; 
 color: white; 
 } 
 .ctl-btn { background: #2563eb; } 
 .disc-btn { background: #d97706; } 
 .action-btn { 
 background: #4b5563; 
 color: white; 
 width: 100%; 
 } 
 .warn-btn {
 background: #d97706; 
 color: white;
 width: 100%;
 transition: background 0.2s;
 }
 .warn-btn.active-pause {
 background: #2563eb; 
 }
 .danger-btn { 
 background: #dc2626; 
 color: white; 
 width: 100%; 
 } 
 @media (max-width: 600px) { 
 .dashboard { grid-template-columns: 1fr; } 
 .bat-val { font-size: 2.2rem; } 
 } 
</style> 
<script> 
 let gattServer = null; 
 let device = null; 
 let recon = false; 
 let isPausedState = false;
 
 let connectStartTime = null; 
 let timerIntervalId = null; 
 
 const svcUuid = "4fafc201-1fb5-459e-8fcc-c5c9c331914b"; 
 const delay = 15000; 
 const UUID_MAX = "4fafc203-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_CUR = "4fafc202-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_MIN = "4fafc204-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_BAT = "4fafc206-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_RST = "4fafc205-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_SLP = "4fafc207-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_EXT = "4fafc208-1fb5-459e-8fcc-c5c9c331914b"; 
 const UUID_PSE = "4fafc209-1fb5-459e-8fcc-c5c9c331914b"; 
 
 function updateTimerDisplay() { 
 if (!connectStartTime) return; 
 const elapsedMs = Date.now() - connectStartTime; 
 
 const totalSecs = Math.floor(elapsedMs / 1000); 
 const secs = String(totalSecs % 60).padStart(2, '0'); 
 const mins = String(Math.floor(totalSecs / 60) % 60).padStart(2, '0'); 
 const hrs = String(Math.floor(totalSecs / 3600)).padStart(2, '0'); 
 
 document.getElementById('elapsedTime').innerText = `${hrs}:${mins}:${secs}`; 
 } 
 
 function startSessionTimer() { 
 stopSessionTimer(); 
 connectStartTime = Date.now(); 
 timerIntervalId = setInterval(updateTimerDisplay, 1000); 
 updateTimerDisplay(); 
 } 
 
 function stopSessionTimer() { 
 if (timerIntervalId) { 
 clearInterval(timerIntervalId); 
 timerIntervalId = null; 
 } 
 } 
 
 function pauseSessionTimer() {
 stopSessionTimer();
 }
 
 function resumeSessionTimer() {
 if (!connectStartTime) return;
 timerIntervalId = setInterval(updateTimerDisplay, 1000);
 }
 
 function updateBatteryUI(v) { 
 let num = ((v - 3.3) / 0.9) * 100; 
 let p = Math.max(0, Math.min(100, Math.round(num))); 
 const el = document.getElementById('batLevel'); 
 const val = document.getElementById('bat'); 
 
 el.style.width = p + '%'; 
 let col = '#ef4444'; 
 if (v >= 3.7) col = '#10b981'; 
 else if (v >= 3.45) col = '#f59e0b'; 
 el.style.backgroundColor = val.style.color = col; 
 } 
 
 function onDisconnected() { 
 document.getElementById('resetBtn').disabled = true; 
 document.getElementById('sleepBtn').disabled = true; 
 document.getElementById('extendBtn').disabled = true;
 document.getElementById('pauseBtn').disabled = true;
 
 const sb = document.getElementById('statusBar'); 
 const st = document.getElementById('statusText'); 
 const btn = document.getElementById('toggleBtn'); 
 
 stopSessionTimer(); 
 
 if (recon) { 
 st.innerText = "•• Connection Lost";
 sb.className = "status-bar reconnecting";
 btn.innerText = "Connect";
 btn.className = "hdr-btn ctl-btn";
 btn.disabled = false;
 setTimeout(attemptReconnect, delay);
 } else {
 st.innerText = "•• Disconnected"; 
 sb.className = "status-bar"; 
 btn.innerText = "Connect"; 
 btn.className = "hdr-btn ctl-btn"; 
 btn.disabled = false; 
 clearDisplay(); 
 } 
 } 
 
 function toggleConnection() { 
 const btn = document.getElementById('toggleBtn'); 
 if (device && device.gatt.connected) { 
 recon = false; 
 btn.disabled = true; 
 device.gatt.disconnect(); 
 } else { 
 connectBLE(); 
 } 
 } 
 
 function clearDisplay() { 
 document.getElementById('max').innerText = "--.- °C"; 
 document.getElementById('cur').innerText = "--.- °C"; 
 document.getElementById('min').innerText = "--.- °C"; 
 document.getElementById('bat').innerText = "--.- V"; 
 document.getElementById('batLevel').style.width = "0%"; 
 document.getElementById('elapsedTime').innerText = "00:00:00"; 
 connectStartTime = null; 
 
 isPausedState = false;
 const pBtn = document.getElementById('pauseBtn');
 if(pBtn) {
 pBtn.innerText = "Pause Session";
 pBtn.classList.remove('active-pause');
 }
 } 
 
 async function attemptReconnect() { 
 if (!device || !recon) return; 
 try { 
 gattServer = await device.gatt.connect(); 
 await startGattOperations(); 
 } catch (e) { 
 setTimeout(attemptReconnect, delay); 
 } 
 } 
 
 async function startGattOperations() { 
 const s = await gattServer.getPrimaryService(svcUuid); 
 const sb = document.getElementById('statusBar'); 
 const st = document.getElementById('statusText'); 
 const btn = document.getElementById('toggleBtn'); 
 
 st.innerText = "•• Connected";
 sb.className = "status-bar connected";
 btn.innerText = "Disconnect";
 btn.className = "hdr-btn disc-btn";
 btn.disabled = false;
 
 document.getElementById('resetBtn').disabled = false;
 document.getElementById('sleepBtn').disabled = false;
 document.getElementById('extendBtn').disabled = false;
 document.getElementById('pauseBtn').disabled = false;
 
 startSessionTimer(); 
 
 await setupNotification(s, UUID_MAX, 'max', ' °C');
 await setupNotification(s, UUID_CUR, 'cur', ' °C');
 await setupNotification(s, UUID_MIN, 'min', ' °C');
 await setupNotification(s, UUID_BAT, 'bat', ' V', true);
 } 
 
 async function setupNotification(svc, uuid, id, u, isBat=false) {
 try {
 const c = await svc.getCharacteristic(uuid);
 await c.startNotifications(); 
 
 const init = await c.readValue();
 const txt = new TextDecoder().decode(init); 
 
 document.getElementById(id).innerText = txt + u;
 if (isBat) updateBatteryUI(parseFloat(txt)); 
 
 c.addEventListener('characteristicvaluechanged', (e) => {
 let d = e.target.value;
 const str = new TextDecoder().decode(d);
 document.getElementById(id).innerText = str + u;
 if (isBat) updateBatteryUI(parseFloat(str));
 });
 } catch (err) {
 console.error(err);
 }
 } 
 
 async function connectBLE() {
 try {
 recon = false;
 device = await navigator.bluetooth.requestDevice({ 
 filters: [{ name: 'XIAO_C6_Thermometer' }], 
 optionalServices: [svcUuid] 
 }); 
 let ev = 'gattserverdisconnected'; 
 device.addEventListener(ev, onDisconnected); 
 document.getElementById('toggleBtn').disabled = true; 
 gattServer = await device.gatt.connect(); 
 recon = true; 
 await startGattOperations(); 
 } catch (err) { 
 alert("Connection failed."); 
 document.getElementById('toggleBtn').disabled = false; 
 } 
 } 
 
 async function writeCommand(uuid, payload = '1') { 
 if (!gattServer || !gattServer.connected) return; 
 try { 
 const s = await gattServer.getPrimaryService(svcUuid); 
 const c = await s.getCharacteristic(uuid); 
 
 if (uuid === UUID_SLP) recon = false; 
 
 await c.writeValue(new TextEncoder().encode(payload)); 
 
 if (uuid === UUID_RST) startSessionTimer(); 
 if (uuid === UUID_PSE && payload === '1') pauseSessionTimer();
 if (uuid === UUID_PSE && payload === '0') resumeSessionTimer();
 } catch (e) { 
 console.error(e); 
 } 
 } 
 
 function triggerReset() { writeCommand(UUID_RST); } 
 function triggerSleep() { writeCommand(UUID_SLP); } 
 function triggerExtend() { writeCommand(UUID_EXT, '1'); }
 
 function togglePauseState() {
 const btn = document.getElementById('pauseBtn');
 if (!isPausedState) {
 writeCommand(UUID_PSE, '1');
 isPausedState = true;
 btn.innerText = "Resume Session";
 btn.classList.add('active-pause');
 } else {
 writeCommand(UUID_PSE, '0');
 isPausedState = false;
 btn.innerText = "Pause Session";
 btn.classList.remove('active-pause');
 }
 }
</script>
